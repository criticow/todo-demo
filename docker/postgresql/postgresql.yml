name: demo
services:
  postgresql:
    image: postgres:17.2
    container_name: demo-postgresql
    volumes:
      - demo-pgdata:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    networks:
      - demo-net
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  demo-net:
    driver: bridge

volumes:
  demo-pgdata: